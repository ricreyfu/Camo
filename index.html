<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Camo 3D</title>
<style>
  :root{
    --bg:#0e1410; --panel:#161f19; --panel2:#1d2a22; --line:#2a3a30;
    --ink:#eaf2ec; --dim:#8aa092; --acid:#b6ff3c; --acid-dim:#7fae2a; --danger:#ff5d5d;
    --font-display:"Iowan Old Style","Palatino Linotype",Georgia,serif;
    --font-body:"Avenir Next","Segoe UI",system-ui,sans-serif;
    --font-mono:"JetBrains Mono","Courier New",monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);min-height:100vh;overflow-x:hidden;}
  #ui{max-width:560px;margin:0 auto;padding:20px 18px 60px;}
  h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
  .brand{display:flex;align-items:baseline;gap:10px;margin-bottom:22px;}
  .brand .mark{font-size:30px;color:var(--acid);}
  .brand .name{font-size:26px;letter-spacing:0.5px;}
  .brand .tag{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-left:auto;font-family:var(--font-mono);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:19px;margin-bottom:10px;}
  label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px;font-family:var(--font-mono);}
  input[type=text],input[type=number]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 12px;font-size:15px;font-family:var(--font-body);}
  button{font-family:var(--font-body);font-weight:600;border:none;border-radius:9px;padding:12px 16px;font-size:15px;cursor:pointer;}
  button:active{transform:scale(0.97);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--acid);color:#0e1410;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-family:var(--font-mono);font-size:13px;color:var(--acid);}
  .muted{color:var(--dim);font-size:13px;line-height:1.5;}
  .small{font-size:12px;color:var(--dim);}
  .playerlist{list-style:none;margin:10px 0 0;padding:0;}
  .playerlist li{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;}
  .playerlist li:last-child{border-bottom:none;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--acid);display:inline-block;margin-right:8px;}
  .dot.caught{background:var(--danger);}
  .badge-host{font-family:var(--font-mono);font-size:10px;background:var(--acid);color:#0e1410;border-radius:5px;padding:2px 6px;margin-left:6px;}
  .badge-role{font-family:var(--font-mono);font-size:10px;border-radius:5px;padding:2px 6px;margin-left:6px;}
  .badge-seeker{background:var(--danger);color:#1a0c0c;}
  .badge-hider{background:var(--acid-dim);color:#0e1410;}
  .center{text-align:center;}
  .pulse-dot{width:14px;height:14px;border-radius:50%;background:var(--acid);box-shadow:0 0 0 0 rgba(182,255,60,.6);animation:pulse 1.6s infinite;margin:0 auto 14px;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(182,255,60,.5);}70%{box-shadow:0 0 0 14px rgba(182,255,60,0);}100%{box-shadow:0 0 0 0 rgba(182,255,60,0);}}
  .swatch-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
  .swatch{aspect-ratio:1;border-radius:10px;border:2px solid var(--line);cursor:pointer;}
  .swatch.selected{border-color:var(--acid);box-shadow:0 0 0 2px var(--acid);}
  .pose-row{display:flex;gap:8px;margin-top:8px;}
  .pose-btn{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;text-align:center;cursor:pointer;font-size:13px;}
  .pose-btn.selected{border-color:var(--acid);color:var(--acid);}
  .timer{font-family:var(--font-mono);font-size:40px;text-align:center;color:var(--acid);letter-spacing:2px;}
  .result-banner{font-family:var(--font-display);font-size:24px;text-align:center;padding:14px;border-radius:12px;margin-bottom:12px;}
  .result-win{background:#1c2a1e;border:1px solid var(--acid-dim);color:var(--acid);}
  .result-lose{background:#2a1c1c;border:1px solid #5a2a2a;color:var(--danger);}
  .error-banner{background:#2a1c1c;border:1px solid #5a2a2a;color:var(--danger);padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;}
  ::placeholder{color:#566054;}

  /* ---- 3D GAME OVERLAY ---- */
  #gameWrap{position:fixed;inset:0;display:none;background:#000;}
  #gameCanvas{width:100%;height:100%;display:block;}
  #hud{position:absolute;inset:0;pointer-events:none;font-family:var(--font-mono);}
  #hudTop{position:absolute;top:14px;left:14px;right:14px;display:flex;justify-content:space-between;align-items:flex-start;}
  #hudTimer{background:rgba(14,20,16,0.8);border:1px solid var(--line);border-radius:10px;padding:8px 16px;color:var(--acid);font-size:22px;}
  #hudRole{background:rgba(14,20,16,0.8);border:1px solid var(--line);border-radius:10px;padding:8px 14px;color:var(--ink);font-size:13px;text-align:right;}
  #crosshair{position:absolute;top:50%;left:50%;width:8px;height:8px;margin:-4px;border:2px solid var(--acid);border-radius:50%;}
  #hudBottom{position:absolute;bottom:14px;left:14px;right:14px;text-align:center;color:var(--dim);font-size:12px;background:rgba(14,20,16,0.7);border-radius:8px;padding:6px;}
  #clickToPlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(14,20,16,0.85);color:var(--ink);font-family:var(--font-body);font-size:16px;cursor:pointer;pointer-events:all;text-align:center;flex-direction:column;gap:10px;}
  #clickToPlay .big{font-family:var(--font-display);font-size:24px;color:var(--acid);}
  #exitBtn{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(42,20,20,0.85);color:var(--danger);border:1px solid #5a2a2a;border-radius:8px;padding:6px 14px;font-size:12px;pointer-events:all;cursor:pointer;display:none;}
</style>
</head>
<body>
<div id="ui"></div>

<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="hudTop">
      <div id="hudTimer">--:--</div>
      <div id="hudRole">—</div>
    </div>
    <div id="crosshair"></div>
    <div id="hudBottom">WASD to move · Mouse to look · Click to tag</div>
  </div>
  <button id="exitBtn">Leave round</button>
  <div id="clickToPlay">
    <div class="big">Click to enter the room</div>
    <div>WASD to move, mouse to look around</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============== BACKEND SYNC ============== */
async function apiGetRoom(code){
  const r = await fetch('/api/room?code=' + encodeURIComponent(code));
  if(r.status === 404) return null;
  if(!r.ok){ const b = await r.json().catch(()=>({})); throw new Error(b.detail || b.error || ('Failed ('+r.status+')')); }
  const d = await r.json();
  return d.room;
}
async function apiSaveRoom(code, room){
  const r = await fetch('/api/room', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({code, room}) });
  if(!r.ok){ const b = await r.json().catch(()=>({})); throw new Error(b.detail || b.error || ('Failed ('+r.status+')')); }
}

/* ============== MAP / PALETTE DEFINITION ==============
   One simple rectangular room. Walls + props each have a distinct color,
   forming the palette players sample from to camouflage themselves. */
const ROOM_SIZE = 26;          // floor is ROOM_SIZE x ROOM_SIZE
const WALL_HEIGHT = 6;
const PALETTE = [
  {name:"Wall — Brick Red",   hex:0xb5453b},
  {name:"Wall — Slate Blue",  hex:0x3b5b8c},
  {name:"Wall — Moss Green",  hex:0x4f7a4a},
  {name:"Wall — Sand",        hex:0xc9a96b},
  {name:"Floor — Concrete",   hex:0x8b8d86},
  {name:"Crate — Orange",     hex:0xd97b32},
  {name:"Crate — Violet",     hex:0x7a4f9c},
  {name:"Crate — Teal",       hex:0x2f9c92},
  {name:"Plain White",        hex:0xf2f2f2}
];
const PROPS = [
  // x, z, size, colorHex
  {x:-9, z:-9, s:2.4, hex:0xd97b32},
  {x: 9, z:-9, s:2.0, hex:0x7a4f9c},
  {x:-9, z: 9, s:2.2, hex:0x2f9c92},
  {x: 9, z: 9, s:2.6, hex:0xd97b32},
  {x: 0, z:-6, s:1.8, hex:0x7a4f9c},
  {x: 4, z: 4, s:1.6, hex:0x2f9c92},
];

/* ============== STATE ============== */
let state = {
  screen:"home", mode:null, roomCode:null, playerId:null, playerName:"",
  isHost:false, room:null, errorMsg:null, lastSeenUpdatedAt:0, pollHandle:null,
  prepColor: PALETTE[8].hex, prepPose:"stand"
};
function uid(){ return Math.random().toString(36).slice(2,9); }
function code(){ return Math.random().toString(36).slice(2,4).toUpperCase() + Math.random().toString(36).slice(2,4).toUpperCase(); }

function freshRoom(hostId, hostName){
  return {
    players: { [hostId]: { name:hostName, host:true, role:null, color:PALETTE[8].hex, pose:"stand",
      x:0, y:0, z:0, yaw:0, caught:false } },
    settings: { seekers:1, roundSeconds:90 },
    phase:"lobby",          // lobby, prep, seek, result
    prepUntil:null, seekUntil:null,
    updatedAt: Date.now()
  };
}

/* ============== SYNC ============== */
async function pushRoom(){
  if(state.mode!=="online") return;
  state.room.updatedAt = Date.now();
  state.lastSeenUpdatedAt = state.room.updatedAt;
  try{ await apiSaveRoom(state.roomCode, state.room); state.errorMsg=null; }
  catch(e){ state.errorMsg = "Connection hiccup: " + e.message; }
}
async function pullRoom(){
  if(state.mode!=="online") return;
  try{
    const incoming = await apiGetRoom(state.roomCode);
    if(incoming && incoming.updatedAt >= state.lastSeenUpdatedAt){
      state.room = incoming;
      state.lastSeenUpdatedAt = incoming.updatedAt;
      onRoomUpdated();
    }
    state.errorMsg = null;
  }catch(e){ state.errorMsg = "Connection hiccup: " + e.message; }
}
function startPolling(){ stopPolling(); state.pollHandle = setInterval(pullRoom, 1200); }
function stopPolling(){ if(state.pollHandle){ clearInterval(state.pollHandle); state.pollHandle=null; } }

function onRoomUpdated(){
  if(game.active) return; // positions are read live from state.room each frame during play
  renderUI();
  maybeEnterFromPhase();
}

/* ============== UI RENDERING (lobby / settings / menus) ============== */
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }

function renderUI(){
  document.getElementById('gameWrap').style.display = (state.screen==="ingame") ? "block" : "none";
  const ui = document.getElementById('ui');
  ui.style.display = (state.screen==="ingame") ? "none" : "block";
  if(state.screen==="ingame") return;

  ui.innerHTML = "";
  ui.appendChild(brandHeader());
  if(state.errorMsg) ui.appendChild(el(`<div class="error-banner">${state.errorMsg}</div>`));

  let body;
  if(state.screen==="home") body = renderHome();
  else if(state.screen==="settings") body = renderSettings();
  else if(state.room){
    const phase = state.room.phase;
    if(phase==="prep") body = renderPrep();
    else if(phase==="result") body = renderResult();
    else body = renderLobby();
  } else body = renderHome();

  ui.appendChild(body);
}
function brandHeader(){
  return el(`<div class="brand"><span class="mark">◈</span><span class="name">Camo 3D</span>
    <span class="tag">${state.mode==="online" ? "Room "+(state.roomCode||"") : ""}</span></div>`);
}

/* ---- HOME ---- */
function renderHome(){
  const wrap = el(`<div></div>`);
  const card = el(`
    <div class="card">
      <h2>Paint to disappear</h2>
      <p class="muted">A simplified, browser-friendly take on the paint-and-hide game. Sample a color from the room, pick a pose, and freeze. The seeker moves around in 3D and has to actually spot you.</p>
      <label>Your name</label>
      <input type="text" id="nameInput" placeholder="e.g. Robin" />
      <div class="row" style="margin-top:18px;">
        <button class="btn-primary" id="hostBtn">Host room</button>
        <button class="btn-ghost" id="joinBtn">Join with code</button>
      </div>
    </div>
  `);
  wrap.appendChild(card);

  card.querySelector('#hostBtn').onclick = async () => {
    const name = card.querySelector('#nameInput').value.trim() || "Host";
    state.playerName = name; state.playerId = uid(); state.isHost = true; state.mode = "online";
    state.roomCode = code(); state.room = freshRoom(state.playerId, name);
    state.lastSeenUpdatedAt = state.room.updatedAt;
    try{ await apiSaveRoom(state.roomCode, state.room); }
    catch(e){ alert("Couldn't create the room: " + e.message); return; }
    startPolling(); state.screen="lobby"; renderUI();
  };

  card.querySelector('#joinBtn').onclick = () => {
    const name = card.querySelector('#nameInput').value.trim() || "Player";
    state.playerName = name;
    const joinCard = el(`
      <div class="card">
        <h2>Join a room</h2>
        <label>Room code</label>
        <input type="text" id="codeInput" placeholder="e.g. ZK3Q" style="text-transform:uppercase;" />
        <button class="btn-primary" id="confirmJoin" style="margin-top:14px;width:100%;">Join</button>
        <p class="small" style="margin-top:10px;"><a id="backHome" style="color:var(--acid);cursor:pointer;text-decoration:underline;">← back</a></p>
      </div>
    `);
    wrap.replaceChild(joinCard, card);
    joinCard.querySelector('#backHome').onclick = () => { state.screen="home"; renderUI(); };
    joinCard.querySelector('#confirmJoin').onclick = async () => {
      const c = joinCard.querySelector('#codeInput').value.trim().toUpperCase();
      if(!c) return;
      let room;
      try{ room = await apiGetRoom(c); }
      catch(e){ alert("Couldn't reach server: " + e.message); return; }
      if(!room){ alert("No room found with that code."); return; }
      state.roomCode = c; state.room = room; state.playerId = uid(); state.isHost = false; state.mode = "online";
      state.room.players[state.playerId] = { name:state.playerName, host:false, role:null, color:PALETTE[8].hex,
        pose:"stand", x:0,y:0,z:0, yaw:0, caught:false };
      state.room.updatedAt = Date.now();
      state.lastSeenUpdatedAt = state.room.updatedAt;
      try{ await apiSaveRoom(state.roomCode, state.room); }
      catch(e){ alert("Couldn't join: " + e.message); return; }
      startPolling(); state.screen="lobby"; renderUI();
    };
  };
  return wrap;
}

/* ---- LOBBY ---- */
function renderLobby(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const codeCard = el(`<div class="card center"><p class="small">Share this code so friends can join</p>
    <div class="pill" style="font-size:20px;padding:8px 18px;">${state.roomCode}</div></div>`);
  wrap.appendChild(codeCard);

  const ids = Object.keys(room.players);
  const playersCard = el(`<div class="card"><h2>Players (${ids.length})</h2><ul class="playerlist" id="plist"></ul></div>`);
  const plist = playersCard.querySelector('#plist');
  ids.forEach(id=>{
    const p = room.players[id];
    plist.appendChild(el(`<li><span><span class="dot"></span>${p.name}${p.host?'<span class="badge-host">HOST</span>':''}</span></li>`));
  });
  wrap.appendChild(playersCard);

  const canStart = ids.length >= 2;
  if(state.isHost){
    const settingsCard = el(`
      <div class="card">
        <h2>Round settings</h2>
        <p class="muted">${room.settings.seekers} seeker${room.settings.seekers>1?'s':''} · ${Math.round(room.settings.roundSeconds/60*10)/10} min round</p>
        <button class="btn-ghost" id="openSettings" style="width:100%;margin-top:6px;">Customize game</button>
      </div>
    `);
    wrap.appendChild(settingsCard);
    settingsCard.querySelector('#openSettings').onclick = () => { state.screen="settings"; renderUI(); };

    const startCard = el(`<div class="card"><button class="btn-primary" id="startBtn" style="width:100%;" ${canStart?'':'disabled'}>Start round</button>
      ${canStart?'':'<p class="small" style="margin-top:8px;">Need at least 2 players.</p>'}</div>`);
    startCard.querySelector('#startBtn').onclick = () => { if(canStart) startRound(); };
    wrap.appendChild(startCard);
  } else {
    wrap.appendChild(el(`<div class="card center" style="padding:30px 18px;">
      <div class="pulse-dot"></div><h2>Waiting for the host</h2>
      <p class="muted" style="margin-top:8px;">${room.settings.seekers} seeker${room.settings.seekers>1?'s':''} · ${Math.round(room.settings.roundSeconds/60*10)/10} min round</p>
    </div>`));
  }
  return wrap;
}

/* ---- SETTINGS ---- */
function renderSettings(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const card = el(`
    <div class="card">
      <h2>Rules</h2>
      <label>Number of seekers</label>
      <input type="number" min="1" max="3" id="seekerCount" value="${room.settings.seekers}" />
      <label>Round length (seconds)</label>
      <input type="number" min="30" step="15" id="roundLen" value="${room.settings.roundSeconds}" />
      <button class="btn-primary" id="saveBtn" style="width:100%;margin-top:14px;">Save</button>
    </div>
  `);
  card.querySelector('#saveBtn').onclick = () => {
    room.settings.seekers = Math.max(1, parseInt(card.querySelector('#seekerCount').value)||1);
    room.settings.roundSeconds = Math.max(30, parseInt(card.querySelector('#roundLen').value)||90);
    pushRoom(); state.screen="lobby"; renderUI();
  };
  wrap.appendChild(card);
  const back = el(`<div class="card"><button class="btn-ghost" id="backLobby" style="width:100%;">← Back</button></div>`);
  back.querySelector('#backLobby').onclick = () => { state.screen="lobby"; renderUI(); };
  wrap.appendChild(back);
  return wrap;
}

/* ---- PREP (color + pose + placement) ---- */
function renderPrep(){
  const room = state.room;
  const me = room.players[state.playerId];
  const isSeeker = me.role === "seeker";
  const wrap = el(`<div></div>`);

  if(isSeeker){
    wrap.appendChild(el(`<div class="card center"><h2>You're the seeker</h2>
      <p class="muted">Everyone else is painting themselves to blend into the room. Sit tight — you'll drop in once prep ends.</p>
      <div class="timer" id="prepTimer">--</div></div>`));
  } else {
    const card = el(`
      <div class="card">
        <h2>Pick your camouflage</h2>
        <p class="muted">Sample a color from the room, then choose a pose. You'll place yourself in the 3D room next.</p>
        <div class="swatch-grid" id="swatchGrid"></div>
        <label>Pose</label>
        <div class="pose-row" id="poseRow">
          <div class="pose-btn" data-pose="stand">Stand</div>
          <div class="pose-btn" data-pose="crouch">Crouch</div>
          <div class="pose-btn" data-pose="lie">Lie down</div>
        </div>
        <button class="btn-primary" id="enterPrep" style="width:100%;margin-top:16px;">Enter the room</button>
      </div>
    `);
    const grid = card.querySelector('#swatchGrid');
    PALETTE.forEach(p=>{
      const sw = el(`<div class="swatch" title="${p.name}" style="background:#${p.hex.toString(16).padStart(6,'0')};"></div>`);
      if(p.hex === state.prepColor) sw.classList.add('selected');
      sw.onclick = () => { grid.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected')); sw.classList.add('selected'); state.prepColor = p.hex; };
      grid.appendChild(sw);
    });
    card.querySelectorAll('.pose-btn').forEach(b=>{
      if(b.dataset.pose === state.prepPose) b.classList.add('selected');
      b.onclick = () => { card.querySelectorAll('.pose-btn').forEach(x=>x.classList.remove('selected')); b.classList.add('selected'); state.prepPose = b.dataset.pose; };
    });
    card.querySelector('#enterPrep').onclick = () => {
      me.color = state.prepColor; me.pose = state.prepPose;
      pushRoom();
      enterGame();
    };
    wrap.appendChild(card);
  }
  const tick = setInterval(()=>{
    if(!state.room || state.room.phase!=="prep"){ clearInterval(tick); return; }
    const remain = Math.max(0, Math.round((state.room.prepUntil - Date.now())/1000));
    const d = document.getElementById('prepTimer');
    if(d) d.textContent = remain + "s";
    if(remain<=0){ clearInterval(tick); }
  }, 500);
  return wrap;
}

/* ---- RESULT ---- */
function renderResult(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const ids = Object.keys(room.players);
  const hiders = ids.filter(id=>room.players[id].role==="hider");
  const survivors = hiders.filter(id=>!room.players[id].caught);
  const hidersWin = survivors.length > 0;

  wrap.appendChild(el(`<div class="result-banner ${hidersWin?'result-win':'result-lose'}">
    ${hidersWin ? "Hiders win! 🦎" : "Seekers win!"}
  </div>`));

  const info = el(`<div class="card">
    <p class="muted">${survivors.length} of ${hiders.length} hiders made it to the end.</p>
    <ul class="playerlist" id="resultList"></ul>
  </div>`);
  const list = info.querySelector('#resultList');
  ids.forEach(id=>{
    const p = room.players[id];
    if(p.role!=="hider") return;
    list.appendChild(el(`<li><span><span class="dot ${p.caught?'caught':''}"></span>${p.name}</span><span class="small">${p.caught?'caught':'survived'}</span></li>`));
  });
  wrap.appendChild(info);

  if(state.isHost){
    const again = el(`<div class="card"><button class="btn-primary" id="again" style="width:100%;">Next round</button></div>`);
    again.querySelector('#again').onclick = () => {
      const ids2 = Object.keys(room.players);
      ids2.forEach(id=>{ room.players[id].role=null; room.players[id].caught=false; });
      room.phase = "lobby";
      pushRoom();
    };
    wrap.appendChild(again);
  } else {
    wrap.appendChild(el(`<div class="card center"><p class="small">Waiting for host to start another round…</p></div>`));
  }
  return wrap;
}

/* ============== GAME FLOW ============== */
function startRound(){
  const room = state.room;
  const ids = Object.keys(room.players);
  const n = Math.min(room.settings.seekers, Math.max(1, ids.length-1));
  const shuffled = [...ids].sort(()=>Math.random()-0.5);
  const seekerIds = shuffled.slice(0,n);
  ids.forEach(id=>{
    const isSeeker = seekerIds.includes(id);
    room.players[id].role = isSeeker ? "seeker" : "hider";
    room.players[id].caught = false;
    room.players[id].color = PALETTE[8].hex;
    room.players[id].pose = "stand";
    // scatter starting positions a bit so people aren't stacked
    room.players[id].x = (Math.random()-0.5)*ROOM_SIZE*0.6;
    room.players[id].z = (Math.random()-0.5)*ROOM_SIZE*0.6;
    room.players[id].y = 0;
    room.players[id].yaw = 0;
  });
  room.phase = "prep";
  room.prepUntil = Date.now() + 20000; // 20s to paint & place
  room.seekUntil = null;
  pushRoom();
  state.screen="lobby"; // will be overridden by phase routing
  renderUI();

  // host watches the prep timer and flips to seek phase
  if(state.isHost){
    setTimeout(()=>{ if(state.room && state.room.phase==="prep"){ state.room.phase="seek"; state.room.seekUntil = Date.now()+room.settings.roundSeconds*1000; pushRoom(); } }, 20300);
  }
}

function checkRoundEnd(){
  const room = state.room;
  if(!room || room.phase!=="seek") return;
  const ids = Object.keys(room.players);
  const hiders = ids.filter(id=>room.players[id].role==="hider");
  const allCaught = hiders.length>0 && hiders.every(id=>room.players[id].caught);
  const timeUp = room.seekUntil && Date.now() >= room.seekUntil;
  if(allCaught || timeUp){
    room.phase = "result";
    pushRoom();
  }
}

/* ============== 3D GAME ============== */
const game = {
  active:false, scene:null, camera:null, renderer:null,
  myMesh:null, otherMeshes:{}, raycaster:null,
  keys:{}, yaw:0, pitch:0,
  netTimer:null
};

function buildScene(){
  const THREE_ = THREE;
  const scene = new THREE_.Scene();
  scene.background = new THREE_.Color(0x10140f);
  scene.fog = new THREE_.Fog(0x10140f, 18, 40);

  const ambient = new THREE_.AmbientLight(0xffffff, 0.55);
  scene.add(ambient);
  const sun = new THREE_.DirectionalLight(0xffffff, 0.8);
  sun.position.set(10,20,8);
  scene.add(sun);

  // floor
  const floorMat = new THREE_.MeshStandardMaterial({color:0x8b8d86});
  const floor = new THREE_.Mesh(new THREE_.PlaneGeometry(ROOM_SIZE,ROOM_SIZE), floorMat);
  floor.rotation.x = -Math.PI/2;
  scene.add(floor);

  // walls (N,S,E,W each a different color)
  const wallDefs = [
    {hex:0xb5453b, x:0, z:-ROOM_SIZE/2, rotY:0},
    {hex:0x3b5b8c, x:0, z: ROOM_SIZE/2, rotY:Math.PI},
    {hex:0x4f7a4a, x:-ROOM_SIZE/2, z:0, rotY:Math.PI/2},
    {hex:0xc9a96b, x: ROOM_SIZE/2, z:0, rotY:-Math.PI/2},
  ];
  wallDefs.forEach(w=>{
    const mat = new THREE_.MeshStandardMaterial({color:w.hex});
    const wall = new THREE_.Mesh(new THREE_.PlaneGeometry(ROOM_SIZE, WALL_HEIGHT), mat);
    wall.position.set(w.x, WALL_HEIGHT/2, w.z);
    wall.rotation.y = w.rotY;
    scene.add(wall);
  });

  // props (crates to hide near/behind)
  PROPS.forEach(p=>{
    const mat = new THREE_.MeshStandardMaterial({color:p.hex});
    const box = new THREE_.Mesh(new THREE_.BoxGeometry(p.s,p.s,p.s), mat);
    box.position.set(p.x, p.s/2, p.z);
    scene.add(box);
  });

  return scene;
}

function makeAvatarMesh(colorHex, pose){
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color:colorHex});
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.45,0.45,1.3,12), mat);
  body.position.y = 0.95;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.4,12,12), mat);
  head.position.y = 1.85;
  group.add(body); group.add(head);
  applyPoseToGroup(group, pose);
  return group;
}
function applyPoseToGroup(group, pose){
  if(pose === "crouch"){
    group.scale.set(1,0.55,1);
  } else if(pose === "lie"){
    group.rotation.x = Math.PI/2;
    group.position.y = 0.45;
  } else {
    group.scale.set(1,1,1);
    group.rotation.x = 0;
    group.position.y = 0;
  }
}

function enterGame(){
  state.screen = "ingame";
  renderUI();
  setupGameDOM();
  if(!game.active){
    initThree();
  }
  game.active = true;
  document.getElementById('exitBtn').style.display = "block";
  game.netTimer = setInterval(networkTick, 250);
  requestAnimationFrame(gameLoop);
}

function leaveGame(){
  game.active = false;
  clearInterval(game.netTimer);
  document.getElementById('exitBtn').style.display = "none";
  state.screen = "lobby";
  renderUI();
}

function setupGameDOM(){
  document.getElementById('exitBtn').onclick = () => { document.exitPointerLock && document.exitPointerLock(); leaveGame(); };
  const overlay = document.getElementById('clickToPlay');
  const canvas = document.getElementById('gameCanvas');
  overlay.style.display = "flex";
  overlay.onclick = () => { canvas.requestPointerLock(); };
  document.addEventListener('pointerlockchange', ()=>{
    overlay.style.display = document.pointerLockElement === canvas ? "none" : "flex";
  });
}

function initThree(){
  const canvas = document.getElementById('gameCanvas');
  game.renderer = new THREE.WebGLRenderer({canvas, antialias:true});
  game.renderer.setSize(window.innerWidth, window.innerHeight);
  window.addEventListener('resize', ()=>{
    game.renderer.setSize(window.innerWidth, window.innerHeight);
    game.camera.aspect = window.innerWidth/window.innerHeight;
    game.camera.updateProjectionMatrix();
  });

  game.scene = buildScene();
  game.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
  game.raycaster = new THREE.Raycaster();

  document.addEventListener('keydown', e=>{ game.keys[e.code]=true; });
  document.addEventListener('keyup', e=>{ game.keys[e.code]=false; });
  document.addEventListener('mousemove', e=>{
    if(document.pointerLockElement !== document.getElementById('gameCanvas')) return;
    game.yaw -= e.movementX * 0.0022;
    game.pitch -= e.movementY * 0.0022;
    game.pitch = Math.max(-1.2, Math.min(1.2, game.pitch));
  });
  document.getElementById('gameCanvas').addEventListener('click', ()=>{
    if(document.pointerLockElement !== document.getElementById('gameCanvas')) return;
    tryTag();
  });
}

function gameLoop(){
  if(!game.active) return;
  const room = state.room;
  const me = room.players[state.playerId];
  const isSeeker = me.role === "seeker";
  const phase = room.phase;

  document.getElementById('hudRole').textContent = isSeeker ? "SEEKER — find & click hiders" : "HIDDEN — hold still";
  let timerLabel = "--:--";
  if(phase==="seek" && room.seekUntil){
    const remain = Math.max(0, Math.round((room.seekUntil - Date.now())/1000));
    timerLabel = String(Math.floor(remain/60)).padStart(2,'0')+":"+String(remain%60).padStart(2,'0');
    if(remain<=0) checkRoundEnd();
  } else if(phase==="prep"){
    timerLabel = "prep";
  }
  document.getElementById('hudTimer').textContent = timerLabel;

  if(phase === "result"){
    leaveGame();
    return;
  }

  if(isSeeker && phase==="seek"){
    // free movement
    const speed = 0.14;
    const fwd = new THREE.Vector3(Math.sin(game.yaw), 0, Math.cos(game.yaw));
    const right = new THREE.Vector3(Math.sin(game.yaw+Math.PI/2), 0, Math.cos(game.yaw+Math.PI/2));
    let move = new THREE.Vector3();
    if(game.keys['KeyW']) move.add(fwd);
    if(game.keys['KeyS']) move.sub(fwd);
    if(game.keys['KeyD']) move.add(right);
    if(game.keys['KeyA']) move.sub(right);
    if(move.lengthSq()>0){ move.normalize().multiplyScalar(speed); game.camera.position.add(move); }
    const bound = ROOM_SIZE/2 - 1;
    game.camera.position.x = Math.max(-bound, Math.min(bound, game.camera.position.x));
    game.camera.position.z = Math.max(-bound, Math.min(bound, game.camera.position.z));
    game.camera.position.y = 1.7;

    me.x = game.camera.position.x; me.z = game.camera.position.z; me.yaw = game.yaw;
  } else {
    // hiders / pre-seek: fixed external view of own spot
    game.camera.position.set(me.x, 3.2, me.z+4.5);
    game.camera.lookAt(me.x, 1, me.z);
  }

  game.camera.rotation.order = "YXZ";
  if(isSeeker && phase==="seek"){
    game.camera.rotation.y = game.yaw;
    game.camera.rotation.x = game.pitch;
  }

  renderOtherPlayers();
  game.renderer.render(game.scene, game.camera);
  requestAnimationFrame(gameLoop);
}

function renderOtherPlayers(){
  const room = state.room;
  const ids = Object.keys(room.players);
  ids.forEach(id=>{
    if(id === state.playerId) return;
    const p = room.players[id];
    if(p.caught && room.phase==="seek"){
      if(game.otherMeshes[id]){ game.scene.remove(game.otherMeshes[id]); delete game.otherMeshes[id]; }
      return;
    }
    if(!game.otherMeshes[id]){
      game.otherMeshes[id] = makeAvatarMesh(p.color, p.pose);
      game.scene.add(game.otherMeshes[id]);
    }
    const mesh = game.otherMeshes[id];
    mesh.position.x = p.x; mesh.position.z = p.z;
    mesh.rotation.y = p.yaw || 0;
    mesh.userData.playerId = id;
    // keep pose/color in sync if changed
    mesh.children.forEach(c=>{ if(c.material.color.getHex() !== p.color) c.material.color.setHex(p.color); });
  });
  // remove stale meshes for players no longer present
  Object.keys(game.otherMeshes).forEach(id=>{
    if(!room.players[id]){ game.scene.remove(game.otherMeshes[id]); delete game.otherMeshes[id]; }
  });
}

function tryTag(){
  const room = state.room;
  const me = room.players[state.playerId];
  if(me.role !== "seeker" || room.phase !== "seek") return;
  game.raycaster.setFromCamera({x:0,y:0}, game.camera);
  const targets = Object.values(game.otherMeshes);
  const hits = game.raycaster.intersectObjects(targets, true);
  if(hits.length === 0) return;
  let hitGroup = hits[0].object;
  while(hitGroup.parent && !hitGroup.userData.playerId) hitGroup = hitGroup.parent;
  const targetId = hitGroup.userData.playerId;
  if(!targetId) return;
  const dist = game.camera.position.distanceTo(hitGroup.position);
  if(dist > 9) return; // out of tagging range
  const target = room.players[targetId];
  if(!target || target.role !== "hider" || target.caught) return;
  target.caught = true;
  pushRoom();
  checkRoundEnd();
}

function networkTick(){
  pullRoom();
  pushRoom();
}

/* ============== ROUTING HELPERS ============== */
function maybeEnterFromPhase(){
  if(!state.room) return;
  const me = state.room.players[state.playerId];
  if(!me) return;
  if(state.room.phase === "seek" && state.screen !== "ingame"){
    enterGame();
  }
}

/* ============== INIT ============== */
renderUI();
</script>
