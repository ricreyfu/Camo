<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Camo</title>
<style>
  :root{
    --bg:#0e1410;
    --panel:#161f19;
    --panel2:#1d2a22;
    --line:#2a3a30;
    --ink:#eaf2ec;
    --dim:#8aa092;
    --acid:#b6ff3c;
    --acid-dim:#7fae2a;
    --danger:#ff5d5d;
    --font-display: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    --font-body: "Avenir Next", "Segoe UI", system-ui, sans-serif;
    --font-mono: "JetBrains Mono", "Courier New", monospace;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);min-height:100vh;}
  #app{max-width:560px;margin:0 auto;padding:20px 18px 60px;}
  h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
  .brand{display:flex;align-items:baseline;gap:10px;margin-bottom:22px;}
  .brand .mark{font-size:30px;color:var(--acid);}
  .brand .name{font-size:26px;letter-spacing:0.5px;}
  .brand .tag{color:var(--dim);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;margin-left:auto;font-family:var(--font-mono);}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px;}
  .card h2{font-size:19px;margin-bottom:10px;}
  label{display:block;font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;margin-top:14px;font-family:var(--font-mono);}
  input[type=text],input[type=number],select,textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:15px;font-family:var(--font-body);
  }
  textarea{min-height:90px;resize:vertical;font-family:var(--font-mono);font-size:13px;}
  button{
    font-family:var(--font-body);font-weight:600;border:none;border-radius:9px;padding:12px 16px;
    font-size:15px;cursor:pointer;transition:transform .12s ease, opacity .12s ease;
  }
  button:active{transform:scale(0.97);}
  button:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-primary{background:var(--acid);color:#0e1410;}
  .btn-primary:hover{opacity:0.92;}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line);}
  .btn-ghost:hover{border-color:var(--acid-dim);}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid #4a2222;}
  .row{display:flex;gap:10px;}
  .row > *{flex:1;}
  .pill{display:inline-block;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px 12px;font-family:var(--font-mono);font-size:13px;color:var(--acid);}
  .muted{color:var(--dim);font-size:13px;line-height:1.5;}
  .playerlist{list-style:none;margin:10px 0 0;padding:0;}
  .playerlist li{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--line);font-size:15px;}
  .playerlist li:last-child{border-bottom:none;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--acid);display:inline-block;margin-right:8px;}
  .center{text-align:center;}
  .reveal-box{
    background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
    border-radius:16px;padding:34px 18px;text-align:center;margin:16px 0;cursor:pointer;user-select:none;
    min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;
  }
  .reveal-box .hint{color:var(--dim);font-family:var(--font-mono);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;}
  .reveal-box .category{color:var(--acid-dim);font-family:var(--font-mono);font-size:13px;letter-spacing:1px;}
  .reveal-box .word{font-family:var(--font-display);font-size:30px;margin-top:4px;}
  .timer{font-family:var(--font-mono);font-size:54px;text-align:center;color:var(--acid);letter-spacing:2px;}
  .small{font-size:12px;color:var(--dim);}
  a.linklike{color:var(--acid);text-decoration:underline;cursor:pointer;}
  .catchip{display:inline-flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 10px;margin:3px;font-size:13px;}
  .catchip button{background:none;border:none;color:var(--danger);padding:0;font-size:13px;cursor:pointer;}
  .badge-host{font-family:var(--font-mono);font-size:10px;background:var(--acid);color:#0e1410;border-radius:5px;padding:2px 6px;margin-left:6px;}
  .voteopt{display:flex;align-items:center;justify-content:space-between;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;}
  .voteopt.selected{border-color:var(--acid);background:#1c2a1e;}
  .result-banner{font-family:var(--font-display);font-size:24px;text-align:center;padding:14px;border-radius:12px;margin-bottom:12px;}
  .result-win{background:#1c2a1e;border:1px solid var(--acid-dim);color:var(--acid);}
  .result-lose{background:#2a1c1c;border:1px solid #5a2a2a;color:var(--danger);}
  .error-banner{background:#2a1c1c;border:1px solid #5a2a2a;color:var(--danger);padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:13px;}
  ::placeholder{color:#566054;}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============== BACKEND SYNC (real API, not window.storage) ============== */
async function apiGetRoom(code){
  const r = await fetch('/api/room?code=' + encodeURIComponent(code));
  if(r.status === 404) return null;
  if(!r.ok){
    const body = await r.json().catch(()=>({}));
    throw new Error(body.detail || body.error || ('Failed to load room (' + r.status + ')'));
  }
  const data = await r.json();
  return data.room;
}
async function apiSaveRoom(code, room){
  const r = await fetch('/api/room', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ code, room })
  });
  if(!r.ok){
    const body = await r.json().catch(()=>({}));
    throw new Error(body.detail || body.error || ('Failed to save room (' + r.status + ')'));
  }
}

/* ============== DEFAULT WORD PACK ============== */
const DEFAULT_PACK = {
  "Kitchen": ["Spatula","Toaster","Fridge","Whisk","Cutting board","Microwave","Saucepan","Colander"],
  "Movies": ["The Godfather","Inception","Titanic","Jaws","Frozen","Alien","Up","Jurassic Park"],
  "Sports": ["Tennis","Cricket","Basketball","Golf","Boxing","Surfing","Rugby","Bowling"],
  "Animals": ["Giraffe","Octopus","Penguin","Kangaroo","Hedgehog","Falcon","Otter","Camel"],
  "Vacation": ["Beach resort","Ski lodge","Road trip","Cruise ship","Campsite","Safari","Theme park","City break"]
};

/* ============== STATE ============== */
let state = {
  screen: "home",
  mode: null,            // "local" or "online"
  roomCode: null,
  playerId: null,
  playerName: "",
  isHost: false,
  room: null,
  myRevealOpen: false,
  selectedVote: null,
  pollHandle: null,
  localRevealIndex: 0,
  errorMsg: null,
  lastSeenUpdatedAt: 0
};

function uid(){ return Math.random().toString(36).slice(2,9); }
function code(){ return Math.random().toString(36).slice(2,6).toUpperCase(); }

function freshRoom(hostId, hostName){
  return {
    players: [{id: hostId, name: hostName, host:true}],
    settings: { chameleons: 1, discussSeconds: 180 },
    pack: JSON.parse(JSON.stringify(DEFAULT_PACK)),
    activeCategories: Object.keys(DEFAULT_PACK),
    phase: "lobby",
    round: null,
    votes: {},
    timerStart: null,
    lastResult: null,
    updatedAt: Date.now()
  };
}

/* ============== ONLINE SYNC ============== */
async function pushRoom(){
  if(state.mode !== "online") return;
  state.room.updatedAt = Date.now();
  state.lastSeenUpdatedAt = state.room.updatedAt;
  try{
    await apiSaveRoom(state.roomCode, state.room);
    state.errorMsg = null;
  }catch(e){
    state.errorMsg = "Connection hiccup — retrying… (" + e.message + ")";
  }
}
async function pullRoom(){
  if(state.mode !== "online") return;
  try{
    const incoming = await apiGetRoom(state.roomCode);
    if(incoming && incoming.updatedAt > state.lastSeenUpdatedAt){
      state.room = incoming;
      state.lastSeenUpdatedAt = incoming.updatedAt;
      render();
    }
    state.errorMsg = null;
  }catch(e){
    state.errorMsg = "Connection hiccup — retrying… (" + e.message + ")";
  }
}
function startPolling(){
  stopPolling();
  state.pollHandle = setInterval(pullRoom, 1500);
}
function stopPolling(){
  if(state.pollHandle){ clearInterval(state.pollHandle); state.pollHandle = null; }
}

/* ============== GAME LOGIC ============== */
function pickWord(room){
  const cats = room.activeCategories.filter(c => room.pack[c] && room.pack[c].length);
  const cat = cats[Math.floor(Math.random()*cats.length)];
  const words = room.pack[cat];
  const word = words[Math.floor(Math.random()*words.length)];
  return {category:cat, word};
}

function startRound(){
  const room = state.room;
  const ids = room.players.map(p=>p.id);
  const n = Math.min(room.settings.chameleons, Math.max(1, ids.length-1));
  const shuffled = [...ids].sort(()=>Math.random()-0.5);
  const chameleonIds = shuffled.slice(0, n);
  const {category, word} = pickWord(room);
  room.round = { category, word, chameleonIds, discussSeconds: room.settings.discussSeconds };
  room.phase = "reveal";
  room.votes = {};
  room.timerStart = null;
  syncRoom();
}

function syncRoom(){
  if(state.mode === "online"){ pushRoom(); }
  render();
}

function beginDiscussion(){
  state.room.phase = "discuss";
  state.room.timerStart = Date.now();
  syncRoom();
}

function castVote(targetId){
  state.selectedVote = targetId;
  state.room.votes[state.playerId] = targetId;
  syncRoom();
}

function tallyAndReveal(){
  const room = state.room;
  const tally = {};
  Object.values(room.votes).forEach(v=>{ tally[v]=(tally[v]||0)+1; });
  let topId=null, topCount=-1;
  Object.entries(tally).forEach(([id,c])=>{ if(c>topCount){topCount=c; topId=id;} });
  room.phase = "result";
  room.lastResult = { accusedId: topId, tally };
  syncRoom();
}

function newRound(){
  state.room.phase = "lobby";
  state.room.round = null;
  state.room.votes = {};
  state.room.lastResult = null;
  state.selectedVote = null;
  syncRoom();
}

/* ============== RENDER ============== */
function el(html){ const d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; }

function render(){
  const app = document.getElementById('app');
  app.innerHTML = "";
  app.appendChild(brandHeader());
  if(state.errorMsg){
    app.appendChild(el(`<div class="error-banner">${state.errorMsg}</div>`));
  }
  let body;
  if(state.screen === "home") body = renderHome();
  else if(state.screen === "lobby") body = renderLobby();
  else if(state.screen === "settings") body = renderSettings();
  else if(state.room && state.room.phase === "reveal") body = renderReveal();
  else if(state.room && state.room.phase === "discuss") body = renderDiscuss();
  else if(state.room && state.room.phase === "vote") body = renderVote();
  else if(state.room && state.room.phase === "result") body = renderResult();
  else body = renderLobby();
  app.appendChild(body);
}

function brandHeader(){
  return el(`<div class="brand">
    <span class="mark">◈</span>
    <span class="name">Camo</span>
    <span class="tag">${state.mode === "online" ? "Room " + (state.roomCode||"") : (state.mode === "local" ? "Pass &amp; Play" : "")}</span>
  </div>`);
}

/* ---- HOME ---- */
function renderHome(){
  const wrap = el(`<div></div>`);
  const card = el(`
    <div class="card">
      <h2>Blend in or get caught</h2>
      <p class="muted">One of you doesn't know the secret word. Everyone else does. Talk it out, vote out the chameleon — and if you catch them, they get one shot to guess the word and steal it back.</p>
      <label>Your name</label>
      <input type="text" id="nameInput" placeholder="e.g. Robin" />
      <div class="row" style="margin-top:18px;">
        <button class="btn-primary" id="hostOnlineBtn">Host online room</button>
        <button class="btn-ghost" id="joinOnlineBtn">Join with code</button>
      </div>
      <div style="margin-top:10px;">
        <button class="btn-ghost" id="localBtn" style="width:100%;">Play pass-&amp;-play on this device</button>
      </div>
    </div>
  `);
  wrap.appendChild(card);

  card.querySelector('#hostOnlineBtn').onclick = async () => {
    const name = card.querySelector('#nameInput').value.trim() || "Host";
    state.playerName = name;
    state.playerId = uid();
    state.isHost = true;
    state.mode = "online";
    state.roomCode = code();
    state.room = freshRoom(state.playerId, name);
    state.lastSeenUpdatedAt = state.room.updatedAt;
    try{
      await apiSaveRoom(state.roomCode, state.room);
    }catch(e){
      alert("Couldn't create the room. Check that the Vercel KV database is connected. Details: " + e.message);
      return;
    }
    startPolling();
    state.screen = "lobby";
    render();
  };

  card.querySelector('#joinOnlineBtn').onclick = () => {
    const name = card.querySelector('#nameInput').value.trim() || "Player";
    state.playerName = name;
    const joinCard = el(`
      <div class="card">
        <h2>Join a room</h2>
        <label>Room code</label>
        <input type="text" id="codeInput" placeholder="e.g. ZK3Q" style="text-transform:uppercase;" />
        <button class="btn-primary" id="confirmJoin" style="margin-top:14px;width:100%;">Join</button>
        <p class="small" style="margin-top:10px;"><a class="linklike" id="backHome">← back</a></p>
      </div>
    `);
    wrap.replaceChild(joinCard, card);
    joinCard.querySelector('#backHome').onclick = () => { state.screen="home"; render(); };
    joinCard.querySelector('#confirmJoin').onclick = async () => {
      const c = joinCard.querySelector('#codeInput').value.trim().toUpperCase();
      if(!c){ return; }
      let room;
      try{
        room = await apiGetRoom(c);
      }catch(e){
        alert("Couldn't reach the room server: " + e.message);
        return;
      }
      if(!room){ alert("No room found with that code. Double check it with your host."); return; }
      state.roomCode = c;
      state.room = room;
      state.playerId = uid();
      state.isHost = false;
      state.mode = "online";
      state.room.players.push({id: state.playerId, name: state.playerName, host:false});
      state.lastSeenUpdatedAt = state.room.updatedAt;
      try{
        await apiSaveRoom(state.roomCode, state.room);
      }catch(e){
        alert("Couldn't join the room: " + e.message);
        return;
      }
      startPolling();
      state.screen = "lobby";
      render();
    };
  };

  card.querySelector('#localBtn').onclick = () => {
    state.mode = "local";
    state.playerId = "local-host";
    state.isHost = true;
    state.room = freshRoom(state.playerId, "Host");
    state.room.players = [];
    state.screen = "lobby";
    render();
  };

  return wrap;
}

/* ---- LOBBY ---- */
function renderLobby(){
  const room = state.room;
  const wrap = el(`<div></div>`);

  if(state.mode === "online"){
    const codeCard = el(`
      <div class="card center">
        <p class="small">Share this code so friends can join</p>
        <div class="pill" style="font-size:20px;padding:8px 18px;">${state.roomCode}</div>
      </div>
    `);
    wrap.appendChild(codeCard);
  }

  const playersCard = el(`<div class="card"><h2>Players (${room.players.length})</h2><ul class="playerlist" id="plist"></ul></div>`);
  const plist = playersCard.querySelector('#plist');
  room.players.forEach(p=>{
    plist.appendChild(el(`<li><span><span class="dot"></span>${p.name}${p.host?'<span class="badge-host">HOST</span>':''}</span></li>`));
  });

  if(state.mode === "local"){
    const addRow = el(`
      <div class="row" style="margin-top:10px;">
        <input type="text" id="localName" placeholder="Add a player name" />
        <button class="btn-ghost" id="addLocal">Add</button>
      </div>
    `);
    playersCard.appendChild(addRow);
    addRow.querySelector('#addLocal').onclick = () => {
      const v = addRow.querySelector('#localName').value.trim();
      if(v){ room.players.push({id: uid(), name:v, host: room.players.length===0}); render(); }
    };
  }
  wrap.appendChild(playersCard);

  const settingsSummary = el(`
    <div class="card">
      <h2>Round settings</h2>
      <p class="muted">${room.settings.chameleons} chameleon${room.settings.chameleons>1?'s':''} · ${Math.round(room.settings.discussSeconds/60)} min discussion · ${room.activeCategories.length} category pack(s) active</p>
      <button class="btn-ghost" id="openSettings" style="width:100%;margin-top:6px;">Customize game</button>
    </div>
  `);
  wrap.appendChild(settingsSummary);
  settingsSummary.querySelector('#openSettings').onclick = () => { state.screen="settings"; render(); };

  const canStart = room.players.length >= 3;
  const startCard = el(`
    <div class="card">
      <button class="btn-primary" id="startBtn" style="width:100%;" ${canStart?'':'disabled'}>Start round</button>
      ${canStart ? '' : '<p class="small" style="margin-top:8px;">Need at least 3 players to start.</p>'}
    </div>
  `);
  startCard.querySelector('#startBtn').onclick = () => { if(canStart) startRound(); };
  wrap.appendChild(startCard);

  return wrap;
}

/* ---- SETTINGS ---- */
function renderSettings(){
  const room = state.room;
  const wrap = el(`<div></div>`);

  const ruleCard = el(`
    <div class="card">
      <h2>Rules</h2>
      <label>Number of chameleons</label>
      <input type="number" min="1" max="3" id="chamCount" value="${room.settings.chameleons}" />
      <label>Discussion time (seconds)</label>
      <input type="number" min="30" step="15" id="discussTime" value="${room.settings.discussSeconds}" />
      <button class="btn-ghost" id="saveRules" style="width:100%;margin-top:14px;">Save rules</button>
    </div>
  `);
  ruleCard.querySelector('#saveRules').onclick = () => {
    room.settings.chameleons = Math.max(1, parseInt(ruleCard.querySelector('#chamCount').value)||1);
    room.settings.discussSeconds = Math.max(30, parseInt(ruleCard.querySelector('#discussTime').value)||180);
    syncRoom();
  };
  wrap.appendChild(ruleCard);

  const catCard = el(`<div class="card"><h2>Category packs</h2><div id="catChips"></div></div>`);
  const chipsHolder = catCard.querySelector('#catChips');
  function redrawChips(){
    chipsHolder.innerHTML = "";
    Object.keys(room.pack).forEach(cat=>{
      const active = room.activeCategories.includes(cat);
      const chip = el(`<span class="catchip" style="${active?'border-color:var(--acid-dim);':'opacity:0.5;'}">${cat} (${room.pack[cat].length}) <button data-cat="${cat}" class="toggleCat">${active?'on':'off'}</button> <button data-cat="${cat}" class="delCat">✕</button></span>`);
      chipsHolder.appendChild(chip);
    });
    chipsHolder.querySelectorAll('.toggleCat').forEach(b=>{
      b.onclick = ()=>{
        const cat = b.dataset.cat;
        const idx = room.activeCategories.indexOf(cat);
        if(idx>=0) room.activeCategories.splice(idx,1); else room.activeCategories.push(cat);
        syncRoom(); redrawChips();
      };
    });
    chipsHolder.querySelectorAll('.delCat').forEach(b=>{
      b.onclick = ()=>{
        const cat = b.dataset.cat;
        delete room.pack[cat];
        room.activeCategories = room.activeCategories.filter(c=>c!==cat);
        syncRoom(); redrawChips();
      };
    });
  }
  redrawChips();
  wrap.appendChild(catCard);

  const addCard = el(`
    <div class="card">
      <h2>Add or edit a category</h2>
      <label>Category name</label>
      <input type="text" id="newCatName" placeholder="e.g. Office Supplies" />
      <label>Words (one per line, 6+ recommended)</label>
      <textarea id="newCatWords" placeholder="Stapler&#10;Paperclip&#10;Sticky note"></textarea>
      <button class="btn-primary" id="saveCat" style="width:100%;margin-top:14px;">Save category</button>
      <p class="small" style="margin-top:8px;">Tip: typing an existing category name overwrites its word list.</p>
    </div>
  `);
  addCard.querySelector('#saveCat').onclick = () => {
    const name = addCard.querySelector('#newCatName').value.trim();
    const words = addCard.querySelector('#newCatWords').value.split('\n').map(w=>w.trim()).filter(Boolean);
    if(!name || words.length<2){ alert("Give it a name and at least 2 words."); return; }
    room.pack[name] = words;
    if(!room.activeCategories.includes(name)) room.activeCategories.push(name);
    syncRoom();
    addCard.querySelector('#newCatName').value = "";
    addCard.querySelector('#newCatWords').value = "";
    redrawChips();
  };
  wrap.appendChild(addCard);

  const back = el(`<div class="card"><button class="btn-ghost" id="backLobby" style="width:100%;">← Back to lobby</button></div>`);
  back.querySelector('#backLobby').onclick = () => { state.screen="lobby"; render(); };
  wrap.appendChild(back);

  return wrap;
}

/* ---- REVEAL ---- */
function renderReveal(){
  const room = state.room;
  const wrap = el(`<div></div>`);

  if(state.mode === "online"){
    const isChameleon = room.round.chameleonIds.includes(state.playerId);
    const box = el(`
      <div class="card">
        <h2>Your card</h2>
        <div class="reveal-box" id="revealBox">
          <div class="hint">${state.myRevealOpen ? "tap to hide" : "tap to reveal — keep it secret"}</div>
        </div>
      </div>
    `);
    const rb = box.querySelector('#revealBox');
    function paint(){
      if(state.myRevealOpen){
        if(isChameleon){
          rb.innerHTML = `<div class="category">CATEGORY</div><div class="word">${room.round.category}</div><div class="hint" style="margin-top:10px;color:var(--danger);">You're the chameleon. You don't know the word.</div>`;
        }else{
          rb.innerHTML = `<div class="category">${room.round.category.toUpperCase()}</div><div class="word">${room.round.word}</div>`;
        }
      }else{
        rb.innerHTML = `<div class="hint">tap to reveal — keep it secret</div>`;
      }
    }
    paint();
    rb.onclick = ()=>{ state.myRevealOpen = !state.myRevealOpen; paint(); };
    wrap.appendChild(box);

    const readyCard = el(`<div class="card"><p class="muted">Once everyone has secretly checked their card, the host starts discussion.</p>${state.isHost?'<button class="btn-primary" id="goDiscuss" style="width:100%;">Start discussion</button>':'<p class="small">Waiting for host…</p>'}</div>`);
    if(state.isHost) readyCard.querySelector('#goDiscuss').onclick = beginDiscussion;
    wrap.appendChild(readyCard);

  } else {
    const idx = state.localRevealIndex;
    const players = room.players;
    if(idx >= players.length){
      const ready = el(`<div class="card center"><h2>Everyone's seen their card</h2><button class="btn-primary" id="goDiscuss" style="width:100%;margin-top:10px;">Start discussion</button></div>`);
      ready.querySelector('#goDiscuss').onclick = beginDiscussion;
      wrap.appendChild(ready);
    } else {
      const p = players[idx];
      const isChameleon = room.round.chameleonIds.includes(p.id);
      const box = el(`
        <div class="card">
          <h2>Pass to: ${p.name}</h2>
          <div class="reveal-box" id="revealBox"><div class="hint">tap to reveal your card</div></div>
        </div>
      `);
      const rb = box.querySelector('#revealBox');
      let opened = false;
      rb.onclick = ()=>{
        opened = !opened;
        if(opened){
          rb.innerHTML = isChameleon
            ? `<div class="category">CATEGORY</div><div class="word">${room.round.category}</div><div class="hint" style="margin-top:10px;color:var(--danger);">You're the chameleon!</div>`
            : `<div class="category">${room.round.category.toUpperCase()}</div><div class="word">${room.round.word}</div>`;
        } else {
          rb.innerHTML = `<div class="hint">tap to reveal your card</div>`;
        }
      };
      wrap.appendChild(box);
      const nextBtn = el(`<div class="card"><button class="btn-primary" id="nextPlayer" style="width:100%;">Got it — next player</button></div>`);
      nextBtn.querySelector('#nextPlayer').onclick = () => { state.localRevealIndex++; render(); };
      wrap.appendChild(nextBtn);
    }
  }

  return wrap;
}

/* ---- DISCUSS ---- */
let discussTickHandle = null;
function renderDiscuss(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const elapsed = Math.floor((Date.now() - room.timerStart)/1000);
  const remaining = Math.max(0, room.round.discussSeconds - elapsed);
  const mm = String(Math.floor(remaining/60)).padStart(2,'0');
  const ss = String(remaining%60).padStart(2,'0');

  const card = el(`
    <div class="card center">
      <h2>Discuss</h2>
      <p class="muted">Talk through the category and word. Everyone tries to spot who's faking it.</p>
      <div class="timer" id="timerDisplay">${mm}:${ss}</div>
      <button class="btn-primary" id="goVote" style="width:100%;margin-top:18px;">Move to vote</button>
    </div>
  `);
  card.querySelector('#goVote').onclick = () => { room.phase = "vote"; syncRoom(); };
  wrap.appendChild(card);

  clearInterval(discussTickHandle);
  discussTickHandle = setInterval(()=>{
    if(!state.room || state.room.phase !== "discuss"){ clearInterval(discussTickHandle); return; }
    const e2 = Math.floor((Date.now()-state.room.timerStart)/1000);
    const r2 = Math.max(0, state.room.round.discussSeconds - e2);
    const m2 = String(Math.floor(r2/60)).padStart(2,'0');
    const s2 = String(r2%60).padStart(2,'0');
    const disp = document.getElementById('timerDisplay');
    if(disp) disp.textContent = m2+":"+s2;
    if(r2<=0){ clearInterval(discussTickHandle); }
  }, 1000);

  return wrap;
}

/* ---- VOTE ---- */
function renderVote(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const card = el(`<div class="card"><h2>Who's the chameleon?</h2><div id="voteList"></div></div>`);
  const list = card.querySelector('#voteList');
  room.players.forEach(p=>{
    const selected = state.selectedVote === p.id;
    const opt = el(`<div class="voteopt ${selected?'selected':''}"><span>${p.name}</span><span class="small">${selected?'✓ your vote':''}</span></div>`);
    opt.onclick = () => castVote(p.id);
    list.appendChild(opt);
  });
  wrap.appendChild(card);

  if(state.isHost || state.mode==="local"){
    const tallyCard = el(`<div class="card"><p class="muted">${Object.keys(room.votes).length} of ${room.players.length} votes in.</p><button class="btn-primary" id="reveal" style="width:100%;">Reveal result</button></div>`);
    tallyCard.querySelector('#reveal').onclick = tallyAndReveal;
    wrap.appendChild(tallyCard);
  }
  return wrap;
}

/* ---- RESULT ---- */
function renderResult(){
  const room = state.room;
  const wrap = el(`<div></div>`);
  const accusedId = room.lastResult.accusedId;
  const accused = room.players.find(p=>p.id===accusedId);
  const chameleons = room.players.filter(p=>room.round.chameleonIds.includes(p.id));
  const caughtChameleon = chameleons.some(c=>c.id===accusedId);

  const banner = el(`<div class="result-banner ${caughtChameleon?'result-win':'result-lose'}">
    ${caughtChameleon ? "Caught! 🦎" : "The chameleon got away"}
  </div>`);
  wrap.appendChild(banner);

  const info = el(`
    <div class="card">
      <p class="muted">Group voted out: <strong>${accused?accused.name:'no one'}</strong></p>
      <p class="muted">The chameleon${chameleons.length>1?'s were':' was'}: <strong>${chameleons.map(c=>c.name).join(', ')}</strong></p>
      <p class="muted">Secret word was <strong>${room.round.word}</strong> (category: ${room.round.category}).</p>
      ${caughtChameleon ? `<p class="muted" style="margin-top:8px;">House rule reminder: if you caught them, give the chameleon one guess at the word before locking in the win.</p>` : ''}
    </div>
  `);
  wrap.appendChild(info);

  const again = el(`<div class="card"><button class="btn-primary" id="again" style="width:100%;">Next round</button></div>`);
  again.querySelector('#again').onclick = () => { state.localRevealIndex = 0; newRound(); };
  wrap.appendChild(again);

  return wrap;
}

/* ============== INIT ============== */
render();
</script>
</body>
</html>
